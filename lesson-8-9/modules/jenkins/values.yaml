# ============================================================================
#  Jenkins Helm chart values (rendered by Terraform's templatefile()).
#  Chart docs: https://github.com/jenkinsci/helm-charts
#  The $${...} placeholders are filled in from the module's variables.
# ============================================================================

controller:
  # Admin account. The PASSWORD is auto-generated by the chart and stored in the
  # "jenkins" Secret (key: jenkins-admin-password). Retrieve it with the command
  # printed by 'terraform output'.
  # NOTE: the key is controller.admin.username in the current chart — the old
  # flat 'adminUser' key was removed and the chart refuses to install if it sees it.
  admin:
    username: "${admin_user}"

  # Expose the Jenkins web UI. LoadBalancer asks AWS for a public address.
  serviceType: ${service_type}
  servicePort: 80    # outside port (open http://<address>/ in a browser)
  targetPort: 8080   # inside port (where Jenkins actually listens)

  # CPU / memory for the Jenkins controller pod.
  resources:
    requests:
      cpu: "500m"
      memory: "1024Mi"
    limits:
      cpu: "2000m"
      memory: "2048Mi"

  # Plugins on top of the chart defaults. The defaults ALREADY include kubernetes,
  # git, workflow-aggregator and configuration-as-code — and the chart now ABORTS
  # if additionalPlugins repeats any of them ("PLUGIN CONFLICT"). So we add ONLY
  # what is NOT a default:
  #   • credentials-binding — for withCredentials(...) in the pipeline (used to
  #     inject the GitHub token when pushing the tag update). Not a default, so
  #     it does not conflict. (git is already provided by the defaults above.)
  additionalPlugins:
    - credentials-binding

# The Jenkins controller keeps its data (jobs, config, installed plugins) on a
# persistent disk so a pod restart doesn't wipe everything. This needs the EBS
# CSI driver (installed by the eks module) — otherwise the claim stays Pending.
persistence:
  enabled: true
  storageClass: "${storage_class}"
  size: ${persistence_size}

# Register the "kubernetes" cloud so pipelines can run steps inside dynamically
# created agent pods. Our Jenkinsfile declares its own Kaniko+Git pod inline.
agent:
  enabled: true

# Create the Role + RoleBinding that let the Jenkins controller create/delete
# agent pods in its namespace.
rbac:
  create: true

# Service account for the controller (needs the pod-management rights above).
serviceAccount:
  create: true
  name: jenkins
