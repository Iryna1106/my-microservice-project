# docker-compose.yml — describes all three services and how they connect.
# Run everything with:  docker compose up -d
services:

  # ---- PostgreSQL database ----
  db:
    image: postgres:16
    container_name: db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-myproject}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      # Keep the database data even if the container is recreated.
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      # Compose uses this to know when PostgreSQL is actually ready for connections.
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-myproject}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---- Django web application ----
  web:
    build: .                      # build from the Dockerfile in this folder
    container_name: web
    restart: unless-stopped
    # Apply database migrations, then start the Django server.
    command: sh -c "python manage.py migrate --noinput && python manage.py runserver 0.0.0.0:8000"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-myproject}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_HOST: db           # matches the "db" service name above
      POSTGRES_PORT: 5432
      DJANGO_DEBUG: ${DJANGO_DEBUG:-1}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-django-insecure-change-me}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,[::1],web,django}
    expose:
      - "8000"                    # visible to other containers (nginx), not the host
    depends_on:
      db:
        condition: service_healthy  # wait until PostgreSQL is ready
    networks:
      default:
        aliases:
          # nginx.conf proxies to "http://django:8000", so the web container
          # also answers to the nickname "django" on the network.
          - django

  # ---- Nginx reverse proxy ----
  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"                   # http://localhost  ->  nginx
    volumes:
      # Mount our config as nginx's active site config (read-only).
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web

# Named volume where PostgreSQL stores its data on disk.
volumes:
  postgres_data:
